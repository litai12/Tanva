services:
  db:
    image: docker.1ms.run/library/postgres:16-alpine
    container_name: tanva-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tanva}
    volumes:
      - tanva_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tanva}"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: public.ecr.aws/docker/library/adminer:4
    container_name: tanva-adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5051:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db

  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:v0.70.2
    container_name: tanva-openobserve
    restart: unless-stopped
    ports:
      - "5080:5080"
    environment:
      ZO_DATA_DIR: /data
      ZO_ROOT_USER_EMAIL: ${ZO_ROOT_USER_EMAIL:-root@tanva.local}
      ZO_ROOT_USER_PASSWORD: ${ZO_ROOT_USER_PASSWORD:-ChangeMe_123456}
      ZO_COMPACT_DATA_RETENTION_DAYS: ${ZO_COMPACT_DATA_RETENTION_DAYS:-7}
      ZO_LOCAL_MODE: "true"
      ZO_BASE_URI: /openobserve
      ZO_WEB_URL: https://test.tanvas.cn/openobserve
    volumes:
      - tanva_openobserve_data:/data

  redis:
    image: docker.1ms.run/library/redis:7-alpine
    container_name: tanva-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - tanva_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  tanva_postgres_data:
  tanva_openobserve_data:
  tanva_redis_data:

services:
  new-api-postgres:
    image: docker.1ms.run/library/postgres:16-alpine
    container_name: tanva-new-api-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${NEW_API_PG_USER:-new_api}
      POSTGRES_PASSWORD: ${NEW_API_PG_PASSWORD:-new_api_pass}
      POSTGRES_DB: ${NEW_API_PG_DB:-new_api}
    volumes:
      - tanva_new_api_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NEW_API_PG_USER:-new_api} -d ${NEW_API_PG_DB:-new_api}"]
      interval: 5s
      timeout: 3s
      retries: 10

  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:v0.70.2
    container_name: tanva-openobserve
    restart: unless-stopped
    ports:
      - "5080:5080"
    environment:
      ZO_DATA_DIR: /data
      ZO_ROOT_USER_EMAIL: ${ZO_ROOT_USER_EMAIL:-root@tanva.local}
      ZO_ROOT_USER_PASSWORD: ${ZO_ROOT_USER_PASSWORD:-ChangeMe_123456}
      ZO_COMPACT_DATA_RETENTION_DAYS: ${ZO_COMPACT_DATA_RETENTION_DAYS:-7}
      ZO_LOCAL_MODE: "true"
      ZO_BASE_URI: /openobserve
      ZO_WEB_URL: https://test.tanvas.cn/openobserve
    volumes:
      - tanva_openobserve_data:/data

  redis:
    image: docker.1ms.run/library/redis:7-alpine
    container_name: tanva-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - tanva_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  new-api-patch:
    image: docker.1ms.run/library/postgres:16-alpine
    container_name: tanva-new-api-patch
    restart: "no"
    depends_on:
      new-api-postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${NEW_API_PG_PASSWORD:-new_api_pass}
      PG_USER: ${NEW_API_PG_USER:-new_api}
      PG_DB: ${NEW_API_PG_DB:-new_api}
    volumes:
      - ../new-api/patches:/patches:ro
    command: >
      sh -c "find /patches -name '*.sql' | sort | while read f; do
        echo \"Applying $$f\";
        psql -h new-api-postgres -U $$PG_USER -d $$PG_DB -f $$f || exit 1;
      done && echo 'All patches applied.'"

  new-api:
    build:
      context: ../new-api
      dockerfile: Dockerfile
      args:
        DOCKERHUB_REGISTRY: ${DOCKERHUB_REGISTRY:-docker.1ms.run}
        SKIP_WEB_BUILD: ${NEW_API_SKIP_WEB_BUILD:-1}
        APT_MIRROR: ${APT_MIRROR:-mirrors.aliyun.com}
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
        NO_PROXY: ""
        ALL_PROXY: ""
        http_proxy: ""
        https_proxy: ""
        no_proxy: ""
        all_proxy: ""
    container_name: tanva-new-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      new-api-postgres:
        condition: service_healthy
      new-api-patch:
        condition: service_completed_successfully
    ports:
      - "${NEW_API_PORT:-4458}:4455"
    environment:
      PORT: 4455
      SQL_DSN: postgres://${NEW_API_PG_USER:-new_api}:${NEW_API_PG_PASSWORD:-new_api_pass}@new-api-postgres:5432/${NEW_API_PG_DB:-new_api}?sslmode=disable
      REDIS_CONN_STRING: redis://redis:6379/0
      SESSION_SECRET: ${NEW_API_SESSION_SECRET:-tanva-new-api-local-session}
      GENERATE_DEFAULT_TOKEN: ${NEW_API_GENERATE_DEFAULT_TOKEN:-false}
      MEMORY_CACHE_ENABLED: ${NEW_API_MEMORY_CACHE_ENABLED:-true}
      SYNC_FREQUENCY: ${NEW_API_SYNC_FREQUENCY:-60}
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      ALL_PROXY: ""
      all_proxy: ""
      NO_PROXY: ""
      no_proxy: ""
    volumes:
      - tanva_new_api_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:4455/api/status >/dev/null 2>&1 || wget -qO- http://127.0.0.1:4455/ >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  tanva_new_api_postgres_data:
  tanva_openobserve_data:
  tanva_redis_data:
  tanva_new_api_data:

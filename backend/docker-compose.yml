  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:v0.70.2
    container_name: tanva-openobserve
    restart: unless-stopped
    ports:
      - "5080:5080"
    environment:
      ZO_DATA_DIR: /data
      ZO_ROOT_USER_EMAIL: ${ZO_ROOT_USER_EMAIL:-root@tanva.local}
      ZO_ROOT_USER_PASSWORD: ${ZO_ROOT_USER_PASSWORD:-ChangeMe_123456}
      ZO_COMPACT_DATA_RETENTION_DAYS: ${ZO_COMPACT_DATA_RETENTION_DAYS:-7}
      ZO_LOCAL_MODE: "true"
      ZO_BASE_URI: /openobserve
      ZO_WEB_URL: https://test.tanvas.cn/openobserve
    volumes:
      - tanva_openobserve_data:/data

  redis:
    image: docker.1ms.run/library/redis:7-alpine
    container_name: tanva-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - tanva_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  new-api:
    build:
      context: ../new-api
      dockerfile: Dockerfile
      args:
        DOCKERHUB_REGISTRY: ${DOCKERHUB_REGISTRY:-docker.1ms.run}
        SKIP_WEB_BUILD: ${NEW_API_SKIP_WEB_BUILD:-1}
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
        NO_PROXY: ""
        ALL_PROXY: ""
        http_proxy: ""
        https_proxy: ""
        no_proxy: ""
        all_proxy: ""
    container_name: tanva-new-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${NEW_API_PORT:-4458}:4455"
    environment:
      PORT: 4455
      SQLITE_PATH: /data/one-api.db
      REDIS_CONN_STRING: redis://redis:6379/0
      SESSION_SECRET: ${NEW_API_SESSION_SECRET:-tanva-new-api-local-session}
      GENERATE_DEFAULT_TOKEN: ${NEW_API_GENERATE_DEFAULT_TOKEN:-false}
      MEMORY_CACHE_ENABLED: ${NEW_API_MEMORY_CACHE_ENABLED:-true}
      SYNC_FREQUENCY: ${NEW_API_SYNC_FREQUENCY:-60}
    volumes:
      - tanva_new_api_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:4455/api/status >/dev/null 2>&1 || wget -qO- http://127.0.0.1:4455/ >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  tanva_postgres_data:
  tanva_openobserve_data:
  tanva_redis_data:
  tanva_new_api_data:
